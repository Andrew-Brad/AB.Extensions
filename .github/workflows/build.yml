name: CI

# Two complementary signals:
#   * build-test : the SHIPPING gate. Builds and runs the suite in RELEASE (what
#                  NuGet packs) across Linux + Windows. The test project multi-
#                  targets net8/9/10, so `dotnet test` runs the suite once per
#                  runtime automatically.
#   * coverage   : runs in DEBUG (accurate line mapping) via scripts/coverage.ps1
#                  — the SAME script developers run locally — enforces a coverage
#                  floor and publishes an HTML report artifact.

on:
  # Open PRs are validated by the pull_request trigger; scoping push to the default
  # branch avoids a duplicate run on every PR-branch push (push + pull_request both
  # firing). push then covers post-merge validation of master.
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:   # allow manual runs from the Actions tab

# If you push again while a run is still going, cancel the stale one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Every job needs all three runtimes to *run* the multi-targeted tests.
  DOTNET_VERSIONS: |
    8.0.x
    9.0.x
    10.0.x

jobs:
  build-test:
    name: Build & Test (Release / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # one OS failing shouldn't hide the other's result
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSIONS }}

      # CI gates the shippable projects: the library (all 4 TFMs) and its test suite.
      # The console sandboxes (CoreConsoleApp20, AB.Benchmarks.ConsoleApp) are local
      # dev/benchmark tools — they consume AB.Extensions as a floating package and are
      # exercised locally (scripts/pack-local.ps1), so they're left out of the gate.
      - name: Restore
        run: |
          dotnet restore src/AB.Extensions/AB.Extensions.csproj
          dotnet restore test/AB.Extensions.Tests/AB.Extensions.Tests.csproj

      # Builds netstandard2.0 + net8/9/10 — the full shipping TFM matrix.
      - name: Build library (Release)
        run: dotnet build src/AB.Extensions/AB.Extensions.csproj --configuration Release --no-restore

      # Release == what ships. Builds the test project (and the library via project
      # reference) and runs the suite on net8.0, net9.0 and net10.0.
      - name: Test (Release)
        run: >
          dotnet test test/AB.Extensions.Tests/AB.Extensions.Tests.csproj
          --configuration Release --no-restore --verbosity normal

  coverage:
    name: Coverage (Debug)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSIONS }}

      # Same script developers run locally — enforces the coverage floor and
      # writes a markdown summary to the job summary.
      - name: Collect coverage + enforce threshold
        shell: pwsh
        run: ./scripts/coverage.ps1 -Threshold 90 -Quiet

      - name: Upload HTML coverage report
        if: always()   # publish the report even when the threshold gate fails
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage-report/
