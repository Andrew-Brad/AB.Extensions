name: CI

# Trustworthy baseline CI: restore + build the whole solution, then run the test
# suite, on both Linux and Windows in Debug and Release. The matrix gives a true
# cross-platform / cross-config signal — tests reuse each cell's build output via
# --no-build so we're testing exactly what we compiled.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:   # allow manual runs from the Actions tab

# If you push again while a run is still going, cancel the stale one.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.configuration }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # one cell failing shouldn't hide the others' results
      matrix:
        os: [ubuntu-latest, windows-latest]
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore AB.Extensions.sln

      - name: Build (${{ matrix.configuration }})
        run: dotnet build AB.Extensions.sln --configuration ${{ matrix.configuration }} --no-restore

      - name: Test (${{ matrix.configuration }})
        run: >
          dotnet test test/AB.Extensions.Tests/AB.Extensions.Tests.csproj
          --configuration ${{ matrix.configuration }} --no-build --verbosity normal
